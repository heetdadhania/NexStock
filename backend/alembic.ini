# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# sys.path path, direct or relative, from which to import python modules.
prepend_syspath = .

# template used to generate new migration files
file_template = %%(rev)s_%%(slug)s

# max length of characters to use for the "slug" field
truncate_slug_length = 40

# output encoding
# output_encoding = utf-8

# sqlalchemy.url is dynamically loaded from the environment in env.py,
# but we set a placeholder here as required by alembic configuration.
sqlalchemy.url = ${DATABASE_URL}

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %%(asctime)s %%(levelname)-5.5s [%%(name)s] %%(message)s
datefmt = %%H:%%M:%%S
